<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zander's Lawn Care</title>

<style>
* { box-sizing: border-box; font-family: Arial; }
body { margin: 0; background: #f4f4f4; }

header {
  background: #2e7d32;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 550px;
  margin: 20px auto;
  padding: 15px;
}

.section {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 8px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #ddd;
}

button.active {
  background: #2e7d32;
  color: white;
}

#result {
  font-size: 20px;
  font-weight: bold;
}

.contact input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
}

.contact button {
  width: 100%;
  margin-top: 10px;
  background: #2e7d32;
  color: white;
}
</style>
</head>

<body>

<header>
  <h1>Zander's Lawn Care</h1>
  <p>Full Service Landscaping</p>
</header>

<div class="container">

<!-- Yard Size -->
<div class="section">
  <h3>Yard Size</h3>
  <button onclick="selectSingle(this,setYard,30)">Small ($30)</button>
  <button onclick="selectSingle(this,setYard,50)">Medium ($50)</button>
  <button onclick="selectSingle(this,setYard,75)">Large ($75)</button>
</div>

<!-- Lawn Services -->
<div class="section">
  <h3>Lawn Services</h3>
  <button onclick="toggleService(this,'Mowing',30)">Mowing (+$30)</button>
  <button onclick="toggleService(this,'Edging',10)">Edging (+$10)</button>
  <button onclick="toggleService(this,'Weed Eating',15)">Weed Eating (+$15)</button>
  <button onclick="toggleService(this,'Blowing',10)">Blowing (+$10)</button>
</div>

<!-- Yard Cleanup -->
<div class="section">
  <h3>Cleanup</h3>
  <button onclick="toggleService(this,'Leaf Cleanup',50)">Leaf Cleanup (+$50)</button>
  <button onclick="toggleService(this,'Debris Removal',40)">Debris Removal (+$40)</button>
  <button onclick="toggleService(this,'Mulch Install',60)">Mulch Install (+$60)</button>
</div>

<!-- Landscaping -->
<div class="section">
  <h3>Landscaping</h3>
  <button onclick="toggleService(this,'Bush Trimming',25)">Bush Trimming (+$25)</button>
  <button onclick="toggleService(this,'Hedge Trimming',40)">Hedge Trimming (+$40)</button>
  <button onclick="toggleService(this,'Weeding Beds',30)">Weeding Beds (+$30)</button>
  <button onclick="toggleService(this,'Planting',50)">Planting (+$50)</button>
</div>

<!-- Extra Services -->
<div class="section">
  <h3>Extra Services</h3>
  <button onclick="toggleService(this,'Gutter Cleaning',80)">Gutter Cleaning (+$80)</button>
  <button onclick="toggleService(this,'Pressure Washing',100)">Pressure Washing (+$100)</button>
</div>

<!-- Difficulty -->
<div class="section">
  <h3>Difficulty</h3>
  <button onclick="selectSingle(this,setDifficulty,0)">Normal</button>
  <button onclick="selectSingle(this,setDifficulty,20)">Overgrown (+$20)</button>
  <button onclick="selectSingle(this,setDifficulty,40)">Very Overgrown (+$40)</button>
</div>

<!-- Total -->
<div class="section">
  <h3>Total Price</h3>
  <p id="result">$0</p>
</div>

<!-- Contact -->
<div class="section contact">
  <h3>Send Quote</h3>
  <input id="name" placeholder="Your Name">
  <button onclick="sendQuote()">Text Quote</button>
</div>

</div>

<script>
const zanderPhone = "+1 570-418-5199"
let yard = 0;
let difficulty = 0;
let services = {};

function selectSingle(btn, func, value) {
  let group = btn.parentElement.querySelectorAll("button");
  group.forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  func(value);
}

function setYard(val) {
  yard = val;
  updateTotal();
}

function setDifficulty(val) {
  difficulty = val;
  updateTotal();
}

function toggleService(btn, name, price) {
  if (services[name]) {
    delete services[name];
    btn.classList.remove("active");
  } else {
    services[name] = price;
    btn.classList.add("active");
  }
  updateTotal();
}

function updateTotal() {
  let total = yard + difficulty;

  for (let s in services) {
    total += services[s];
  }

  let high = Math.round(total * 1.25);

  document.getElementById("result").innerText =
    `$${total} - $${high}`;
}

function sendQuote() {
  let name = document.getElementById("name").value;
  let price = document.getElementById("result").innerText;

  if (!name) {
    alert("Enter name and phone");
    return;
  }

  let message = `Hi ${name}, your landscaping quote is ${price}.`;

  window.location.href =
    `sms:${zanderPhone}?body=${encodeURIComponent(message)}`;
}
</script>

</body>
</html>
